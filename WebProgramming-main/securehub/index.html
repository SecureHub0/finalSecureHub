<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Security Community</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="css/common.css" /> <link rel="stylesheet" href="css/index.css" />  </head>
  <body>
    <header>
      <a class="logo" href="index.html">Security<span>Community</span></a>
    </header>

    <main>
      <h1>분야를 선택하세요</h1>
      <p>학습할 보안 분야를 골라주세요</p>
      
      <div class="cards">
        <a class="card card--web" href="main.html?field=web">
          <div class="card-icon">
            <i data-lucide="globe"></i> </div>
          <h2>Web</h2>
          <ul>
            <li>XSS</li>
            <li>SQL Injection</li>
            <li>CSRF</li>
          </ul>
        </a>
        
        <a class="card card--sys" href="main.html?field=system">
          <div class="card-icon">
            <i data-lucide="terminal"></i> </div>
          <h2>System</h2>
          <ul>
            <li>Buffer Overflow</li>
            <li>ROP Chain</li>
            <li>PIE</li>
          </ul>
        </a>
        
        <a class="card card--cloud" href="main.html?field=cloud">
          <div class="card-icon">
            <i data-lucide="cloud"></i> </div>
          <h2>Cloud</h2>
          <ul>
            <li>IAM 취약점</li>
          </ul>
        </a>
    
        <a class="card card--about" href="about.html">
          <div class="card-icon">
            <i data-lucide="users"></i> </div>
          <h2>About</h2>
          <ul>
            <li>Github</li>
            <li>Portfolio</li>
            <li>Blog</li>
          </ul>
        </a>
      </div>
    </main>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
